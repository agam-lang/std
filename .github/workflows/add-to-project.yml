name: Auto Add to Project
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
jobs:
  add_to_project:
    runs-on: ubuntu-latest
    steps:
      - name: Add to GitHub Project
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/orgs/agam-lang/projects/1
          github-token: ${{ secrets.GITHUB_TOKEN }}
